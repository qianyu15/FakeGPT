<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FakeChatGPT Fixed</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0b0f14] text-gray-100 h-screen flex">

<!-- Sidebar -->
<div class="w-64 bg-[#0a0f1a] border-r border-gray-800 flex flex-col">

  <div class="p-4 font-bold border-b border-gray-800">
    FakeChatGPT
  </div>

  <button onclick="newChat()"
    class="m-3 p-2 bg-sky-500 text-black rounded hover:bg-sky-400">
    + New Chat
  </button>

  <div id="sidebar" class="flex-1 overflow-y-auto text-sm p-2 space-y-2"></div>
</div>

<!-- Main -->
<div class="flex flex-col flex-1">

  <div class="h-12 border-b border-gray-800 flex items-center px-4">
    <div class="font-semibold">Chat</div>
  </div>

  <div id="chat" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

  <div class="border-t border-gray-800 p-3 flex gap-2">
    <input id="input"
      class="flex-1 bg-[#111823] p-3 rounded outline-none text-white"
      placeholder="メッセージ..." />

    <button onclick="send()"
      class="px-4 bg-green-400 text-black rounded hover:bg-green-300">
      送信
    </button>
  </div>

</div>

<script>
const chat = document.getElementById("chat");
const sidebar = document.getElementById("sidebar");

let threads = {};
let currentThreadId = "default";

// 初期チャット
threads[currentThreadId] = {
    id: currentThreadId,
    title: "New Chat",
    messages: []
};

renderSidebar();
switchThread(currentThreadId);

// ===== UI =====
function bubble(text, role) {
    const wrap = document.createElement("div");
    wrap.className = "flex " + (role === "user" ? "justify-end" : "justify-start");

    const el = document.createElement("div");
    el.className =
        "max-w-[70%] px-4 py-2 rounded-2xl whitespace-pre-wrap text-sm " +
        (role === "user"
            ? "bg-sky-500 text-black rounded-br-sm"
            : "bg-gray-800 text-gray-100 rounded-bl-sm");

    el.textContent = text;

    wrap.appendChild(el);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
}

// ===== memory =====
function save(role, text) {
    threads[currentThreadId].messages.push({ role, text });
}

// ===== sidebar =====
function renderSidebar() {
    sidebar.innerHTML = "";

    Object.values(threads).forEach(t => {
        const div = document.createElement("div");
        div.className =
            "p-2 rounded cursor-pointer hover:bg-gray-800 " +
            (t.id === currentThreadId ? "bg-gray-800" : "");

        div.textContent = t.title;
        div.onclick = () => switchThread(t.id);

        sidebar.appendChild(div);
    });
}

// ===== switch chat =====
function switchThread(id) {
    currentThreadId = id;
    chat.innerHTML = "";

    threads[id].messages.forEach(m => {
        bubble(m.text, m.role);
    });

    renderSidebar();
}

// ===== new chat =====
function newChat() {
    const id = "chat_" + Date.now();

    threads[id] = {
        id,
        title: "Chat " + Object.keys(threads).length,
        messages: []
    };

    switchThread(id);
}

// ===== AI =====
function ai(msg) {
    msg = msg.toLowerCase();

    if (msg.includes("こんにちは")) return "こんにちは。FakeChatGPTです。";
    if (msg.includes("名前")) return "FakeChatGPT（ローカルUI版）";
    if (msg.includes("コード")) return "console.log('hello world');";

    const pool = [
        "意味が曖昧です",
        "解析不能です",
        "人間の意図を推定できません",
        "ローカルモデルは沈黙しています"
    ];

    return pool[Math.floor(Math.random() * pool.length)];
}

// ===== send =====
function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    save("user", text);
    bubble(text, "user");

    const loading = document.createElement("div");
    loading.className = "text-gray-500 text-sm";
    loading.textContent = "AI is thinking...";
    chat.appendChild(loading);

    setTimeout(() => {
        loading.remove();

        const res = ai(text);
        save("ai", res);
        bubble(res, "ai");
    }, 500);

    input.value = "";
}

document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
