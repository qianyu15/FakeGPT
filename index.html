<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ChatGPT UI</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    * {
      box-sizing: border-box;
      scrollbar-width: thin;
      scrollbar-color: #4b5563 transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    .message-appear {
      animation: messageAppear 0.25s ease-out;
    }

    @keyframes messageAppear {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .typing span {
      animation: blink 1.4s infinite;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {
      0%,
      60%,
      100% {
        opacity: 0.25;
      }

      30% {
        opacity: 1;
      }
    }
  </style>
</head>

<body class="bg-[#212121] text-gray-100">

  <!-- App -->
  <div class="flex h-dvh w-full overflow-hidden">

    <!-- Sidebar -->
    <aside
      id="sidebar"
      class="fixed inset-y-0 left-0 z-50 flex h-dvh w-[280px] max-w-[85vw] -translate-x-full flex-col overflow-hidden bg-[#171717] transition-transform duration-300 md:relative md:h-full md:max-w-none md:translate-x-0"
    >

      <!-- New Chat -->
      <div class="shrink-0 p-3">

        <button
          onclick="newChat()"
          class="flex w-full items-center gap-3 rounded-lg border border-white/10 px-3 py-3 text-sm transition hover:bg-white/10"
        >

          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <path d="M12 5v14" />
            <path d="M5 12h14" />
          </svg>

          <span>
            新しいチャット
          </span>

        </button>

      </div>

      <!-- History -->
      <div class="min-h-0 flex-1 overflow-y-auto px-3">

        <p class="mb-2 px-3 pt-4 text-xs font-semibold text-gray-500">
          今日
        </p>

        <button
          class="flex w-full min-w-0 items-center gap-3 rounded-lg bg-white/10 px-3 py-3 text-left text-sm"
        >

          <svg
            class="shrink-0"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
          >
            <path d="M21 11.5a8.38 8.38 0 0 1-9 8.5 8.8 8.8 0 0 1-4-.9L3 21l1.9-4.4A8.4 8.4 0 0 1 3 11.5a8.38 8.38 0 0 1 9-8.5 8.38 8.38 0 0 1 9 8.5Z" />
          </svg>

          <span class="truncate">
            TailwindでChatGPTを作る
          </span>

        </button>

        <button
          class="flex w-full min-w-0 items-center gap-3 rounded-lg px-3 py-3 text-left text-sm text-gray-300 transition hover:bg-white/10"
        >

          <svg
            class="shrink-0"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
          >
            <path d="M21 11.5a8.38 8.38 0 0 1-9 8.5 8.8 8.8 0 0 1-4-.9L3 21l1.9-4.4A8.4 8.4 0 0 1 3 11.5a8.38 8.38 0 0 1 9-8.5 8.38 8.38 0 0 1 9 8.5Z" />
          </svg>

          <span class="truncate">
            物理パズルゲーム
          </span>

        </button>

      </div>

      <!-- User -->
      <div class="shrink-0 border-t border-white/10 p-3">

        <button
          class="flex w-full min-w-0 items-center gap-3 rounded-lg p-3 text-left transition hover:bg-white/10"
        >

          <div
            class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-gradient-to-br from-purple-500 to-blue-500 text-sm font-bold"
          >
            Q
          </div>

          <div class="min-w-0 flex-1">

            <p class="truncate text-sm font-medium">
              Qianyu
            </p>

            <p class="text-xs text-gray-500">
              設定
            </p>

          </div>

          <svg
            class="shrink-0"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <circle cx="5" cy="12" r="1" />
            <circle cx="12" cy="12" r="1" />
            <circle cx="19" cy="12" r="1" />
          </svg>

        </button>

      </div>

    </aside>

    <!-- Overlay -->
    <div
      id="overlay"
      onclick="toggleSidebar()"
      class="fixed inset-0 z-40 hidden bg-black/60 md:hidden"
    ></div>

    <!-- Main -->
    <main class="flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden">

      <!-- Header -->
      <header
        class="flex h-14 shrink-0 items-center justify-between border-b border-white/10 px-3 sm:px-4"
      >

        <div class="flex min-w-0 items-center gap-2">

          <button
            onclick="toggleSidebar()"
            class="shrink-0 rounded-lg p-2 text-gray-400 transition hover:bg-white/10 hover:text-white md:hidden"
          >

            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <path d="M4 6h16" />
              <path d="M4 12h16" />
              <path d="M4 18h16" />
            </svg>

          </button>

          <button
            class="flex min-w-0 items-center gap-2 rounded-lg px-2 py-2 text-lg font-semibold transition hover:bg-white/10"
          >

            <span>
              ChatGPT
            </span>

            <svg
              class="shrink-0"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m6 9 6 6 6-6" />
            </svg>

          </button>

        </div>

        <button
          class="shrink-0 rounded-lg p-2 text-gray-400 transition hover:bg-white/10 hover:text-white"
          title="共有"
        >

          <svg
            width="21"
            height="21"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 16V3" />
            <path d="m7 8 5-5 5 5" />
            <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7" />
          </svg>

        </button>

      </header>

      <!-- Chat Area -->
      <section
        id="chat"
        class="min-h-0 flex-1 overflow-y-auto"
      >

        <!-- Welcome -->
        <div
          id="welcome"
          class="flex min-h-full items-center justify-center px-4 py-8 sm:py-12"
        >

          <div class="w-full max-w-3xl text-center">

            <!-- AI Avatar -->
            <div class="mb-6 flex justify-center sm:mb-8">

              <div
                class="flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-emerald-400 to-cyan-500 sm:h-16 sm:w-16"
              >

                <svg
                  width="32"
                  height="32"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="black"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M12 3v3" />
                  <path d="M12 18v3" />
                  <path d="M3 12h3" />
                  <path d="M18 12h3" />
                  <path d="m5.64 5.64 2.12 2.12" />
                  <path d="m16.24 16.24 2.12 2.12" />
                  <path d="m5.64 18.36 2.12-2.12" />
                  <path d="m16.24 7.76 2.12-2.12" />
                  <circle cx="12" cy="12" r="4" />
                </svg>

              </div>

            </div>

            <h1
              class="mb-8 text-2xl font-semibold sm:mb-10 sm:text-3xl"
            >
              今日は何をお手伝いしましょうか？
            </h1>

            <div class="grid gap-3 sm:grid-cols-2">

              <button
                onclick="quickMessage('HTMLとTailwindでモダンなUIを作って')"
                class="rounded-xl border border-white/10 p-4 text-left transition hover:bg-white/10"
              >

                <p class="text-sm font-medium">
                  Web UIを作る
                </p>

                <p class="mt-1 text-xs text-gray-500">
                  HTMLとTailwindでデザイン
                </p>

              </button>

              <button
                onclick="quickMessage('JavaScriptのコードを改善して')"
                class="rounded-xl border border-white/10 p-4 text-left transition hover:bg-white/10"
              >

                <p class="text-sm font-medium">
                  コードを書く
                </p>

                <p class="mt-1 text-xs text-gray-500">
                  JavaScriptやPythonなど
                </p>

              </button>

              <button
                onclick="quickMessage('面白いWebアプリのアイデアを考えて')"
                class="rounded-xl border border-white/10 p-4 text-left transition hover:bg-white/10"
              >

                <p class="text-sm font-medium">
                  アイデアを考える
                </p>

                <p class="mt-1 text-xs text-gray-500">
                  新しいプロジェクトを考える
                </p>

              </button>

              <button
                onclick="quickMessage('このUIをもっとかっこよくして')"
                class="rounded-xl border border-white/10 p-4 text-left transition hover:bg-white/10"
              >

                <p class="text-sm font-medium">
                  デザインを改善
                </p>

                <p class="mt-1 text-xs text-gray-500">
                  UIをもっと洗練させる
                </p>

              </button>

            </div>

          </div>

        </div>

        <!-- Messages -->
        <div
          id="messages"
          class="mx-auto hidden w-full max-w-3xl px-4 py-6 sm:py-8"
        ></div>

      </section>

      <!-- Input -->
      <div
        class="shrink-0 px-3 pb-3 pt-2 sm:px-4 sm:pb-4"
      >

        <form
          id="chatForm"
          class="mx-auto w-full max-w-3xl"
        >

          <div
            class="relative rounded-2xl border border-white/10 bg-[#2f2f2f] shadow-2xl"
          >

            <textarea
              id="input"
              rows="1"
              placeholder="メッセージを入力..."
              class="block max-h-40 w-full resize-none overflow-y-auto bg-transparent px-4 py-3.5 pr-14 text-sm leading-6 text-white outline-none placeholder:text-gray-500 sm:py-4"
            ></textarea>

            <!-- Send Button -->
            <button
              id="sendButton"
              type="submit"
              aria-label="送信"
              class="absolute bottom-2.5 right-2.5 flex h-9 w-9 items-center justify-center rounded-lg bg-white text-black transition hover:bg-gray-200 disabled:cursor-not-allowed disabled:opacity-30"
            >

              <svg
                width="19"
                height="19"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 19V5" />
                <path d="m6 11 6-6 6 6" />
              </svg>

            </button>

          </div>

          <p class="mt-2 text-center text-[10px] text-gray-500 sm:text-xs">
            ChatGPTは間違えることがあります。重要な情報は確認してください。
          </p>

        </form>

      </div>

    </main>

  </div>

  <script>

    const form = document.getElementById("chatForm");
    const input = document.getElementById("input");
    const messages = document.getElementById("messages");
    const welcome = document.getElementById("welcome");
    const sendButton = document.getElementById("sendButton");

    let isTyping = false;

    function toggleSidebar() {

      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");

      sidebar.classList.toggle("-translate-x-full");
      overlay.classList.toggle("hidden");

    }

    function newChat() {

      messages.innerHTML = "";

      messages.classList.add("hidden");

      welcome.classList.remove("hidden");

      input.value = "";

      input.style.height = "auto";

      input.focus();

    }

    function quickMessage(text) {

      input.value = text;

      form.requestSubmit();

    }

    function getAIAvatar() {

      return `

        <div
          class="flex h-8 w-8 shrink-0 items-center justify-center rounded-xl bg-gradient-to-br from-emerald-400 to-cyan-500"
        >

          <svg
            width="19"
            height="19"
            viewBox="0 0 24 24"
            fill="none"
            stroke="black"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 3v3" />
            <path d="M12 18v3" />
            <path d="M3 12h3" />
            <path d="M18 12h3" />
            <path d="m5.64 5.64 2.12 2.12" />
            <path d="m16.24 16.24 2.12 2.12" />
            <path d="m5.64 18.36 2.12-2.12" />
            <path d="m16.24 7.76 2.12-2.12" />
            <circle cx="12" cy="12" r="4" />
          </svg>

        </div>

      `;

    }

    function addMessage(text, type) {

      const wrapper = document.createElement("div");

      wrapper.className =
        type === "user"
          ? "mb-8 flex justify-end message-appear"
          : "mb-8 flex gap-4 message-appear";

      if (type === "user") {

        wrapper.innerHTML = `

          <div
            class="max-w-[85%] break-words rounded-2xl bg-[#2f2f2f] px-4 py-3 text-sm leading-7 sm:max-w-[80%]"
          >
            ${escapeHTML(text)}
          </div>

        `;

      } else {

        wrapper.innerHTML = `

          ${getAIAvatar()}

          <div
            class="min-w-0 max-w-[85%] break-words text-sm leading-7 text-gray-200"
          >
            ${escapeHTML(text)}
          </div>

        `;

      }

      messages.appendChild(wrapper);

      scrollToBottom();

    }

    function showTyping() {

      const typing = document.createElement("div");

      typing.id = "typing";

      typing.className =
        "mb-8 flex gap-4 message-appear";

      typing.innerHTML = `

        ${getAIAvatar()}

        <div class="typing flex items-center gap-1 pt-2">

          <span>●</span>
          <span>●</span>
          <span>●</span>

        </div>

      `;

      messages.appendChild(typing);

      scrollToBottom();

    }

    function removeTyping() {

      document.getElementById("typing")?.remove();

    }

    function scrollToBottom() {

      const chat = document.getElementById("chat");

      requestAnimationFrame(() => {

        chat.scrollTo({
          top: chat.scrollHeight,
          behavior: "smooth"
        });

      });

    }

    function escapeHTML(text) {

      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;")
        .replaceAll("\n", "<br>");

    }

    form.addEventListener("submit", async (event) => {

      event.preventDefault();

      const text = input.value.trim();

      if (!text || isTyping) return;

      welcome.classList.add("hidden");

      messages.classList.remove("hidden");

      addMessage(text, "user");

      input.value = "";

      input.style.height = "auto";

      isTyping = true;

      sendButton.disabled = true;

      showTyping();

      await new Promise(resolve => {

        setTimeout(resolve, 900);

      });

      removeTyping();

      addMessage(
        "これはデモ用のChatGPT風UIです。実際のAIに接続する場合は、ここにAPI通信を追加してください。",
        "assistant"
      );

      isTyping = false;

      sendButton.disabled = false;

      input.focus();

    });

    input.addEventListener("input", () => {

      input.style.height = "auto";

      input.style.height =
        Math.min(input.scrollHeight, 160) + "px";

      sendButton.disabled =
        !input.value.trim();

    });

    input.addEventListener("keydown", (event) => {

      if (
        event.key === "Enter" &&
        !event.shiftKey
      ) {

        event.preventDefault();

        form.requestSubmit();

      }

    });

    sendButton.disabled = true;

  </script>

</body>
</html>
