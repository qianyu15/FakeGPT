<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatGPT UI</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Helvetica, Arial, sans-serif;
    }

    .message pre {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .scrollbar::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 999px;
    }
  </style>
</head>

<body class="bg-white text-gray-900">

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="hidden md:flex w-64 flex-col border-r bg-gray-50">

      <div class="p-4">
        <button
          class="flex w-full items-center gap-3 rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm font-medium shadow-sm hover:bg-gray-100 transition"
        >
          <span class="text-lg">＋</span>
          新しいチャット
        </button>
      </div>

      <div class="flex-1 overflow-y-auto px-3 scrollbar">
        <p class="px-3 py-2 text-xs font-semibold text-gray-400">
          今日
        </p>

        <button class="w-full rounded-lg px-3 py-2 text-left text-sm hover:bg-gray-200">
          ファイルについて質問
        </button>

        <button class="w-full rounded-lg px-3 py-2 text-left text-sm hover:bg-gray-200">
          Next.jsのコード解析
        </button>
      </div>

      <div class="border-t p-4">
        <div class="flex items-center gap-3">
          <div class="flex h-9 w-9 items-center justify-center rounded-full bg-black text-white">
            Q
          </div>

          <div>
            <p class="text-sm font-medium">Qianyu</p>
            <p class="text-xs text-gray-500">Free Plan</p>
          </div>
        </div>
      </div>

    </aside>


    <!-- Main -->
    <main class="flex min-w-0 flex-1 flex-col">

      <!-- Header -->
      <header class="flex h-14 items-center justify-between border-b px-4 md:px-6">

        <div class="flex items-center gap-3">
          <button class="md:hidden text-xl">
            ☰
          </button>

          <h1 class="font-semibold">
            ChatGPT
          </h1>

          <span class="rounded-md bg-gray-100 px-2 py-1 text-xs text-gray-500">
            GPT-4o
          </span>
        </div>

        <button
          class="rounded-lg p-2 text-gray-500 hover:bg-gray-100"
          title="設定"
        >
          ⚙
        </button>

      </header>


      <!-- Messages -->
      <section
        id="messages"
        class="scrollbar flex-1 overflow-y-auto px-4 py-8 md:px-20 lg:px-32"
      >

        <!-- User Message -->
        <div class="mx-auto mb-8 flex max-w-3xl gap-4">

          <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-black text-sm text-white">
            Q
          </div>

          <div class="min-w-0 flex-1">

            <p class="mb-2 font-semibold">
              あなた
            </p>

            <div class="rounded-2xl bg-gray-100 p-4">
              このファイルを解析してください。
            </div>

          </div>

        </div>


        <!-- AI Message -->
        <div class="mx-auto flex max-w-3xl gap-4">

          <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-emerald-600 text-sm text-white">
            AI
          </div>

          <div class="min-w-0 flex-1">

            <p class="mb-2 font-semibold">
              ChatGPT
            </p>

            <div class="message leading-7">
              ファイルを確認しました。内容を解析しています。
            </div>

          </div>

        </div>

      </section>


      <!-- Input Area -->
      <div class="px-4 pb-4 md:px-20 lg:px-32">

        <div
          id="filePreview"
          class="mx-auto mb-2 hidden max-w-3xl"
        >
          <div
            id="fileList"
            class="flex flex-wrap gap-2"
          ></div>
        </div>


        <form
          id="chatForm"
          class="mx-auto max-w-3xl"
        >

          <div
            class="relative rounded-2xl border border-gray-300 bg-white shadow-sm transition focus-within:border-gray-500"
          >

            <!-- Textarea -->
            <textarea
              id="messageInput"
              rows="1"
              placeholder="メッセージを入力..."
              class="max-h-48 min-h-[56px] w-full resize-none bg-transparent px-4 pb-14 pt-4 pr-14 outline-none"
            ></textarea>


            <!-- Bottom Controls -->
            <div class="absolute bottom-2 left-2 flex items-center gap-1">

              <!-- File Upload -->
              <label
                for="fileInput"
                class="flex h-9 w-9 cursor-pointer items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 hover:text-black"
                title="ファイルを添付"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.8"
                  stroke="currentColor"
                  class="h-5 w-5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="m18.375 12.739-7.42 7.42a4.5 4.5 0 0 1-6.364-6.364l9.193-9.193a3 3 0 0 1 4.243 4.243l-9.193 9.193a1.5 1.5 0 0 1-2.121-2.121l8.486-8.486"
                  />
                </svg>
              </label>

              <input
                id="fileInput"
                type="file"
                multiple
                hidden
              />

              <!-- Add Button -->
              <button
                type="button"
                class="flex h-9 w-9 items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100"
              >
                ＋
              </button>

            </div>


            <!-- Send Button -->
            <button
              type="submit"
              class="absolute bottom-2 right-2 flex h-9 w-9 items-center justify-center rounded-lg bg-black text-white transition hover:bg-gray-800 disabled:cursor-not-allowed disabled:opacity-40"
              id="sendButton"
            >
              ↑
            </button>

          </div>

        </form>

        <p class="mt-2 text-center text-xs text-gray-400">
          ChatGPTは間違えることがあります。重要な情報は確認してください。
        </p>

      </div>

    </main>

  </div>


  <script>
    const fileInput = document.getElementById("fileInput");
    const filePreview = document.getElementById("filePreview");
    const fileList = document.getElementById("fileList");
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");
    const messages = document.getElementById("messages");

    let selectedFiles = [];


    // ファイル選択
    fileInput.addEventListener("change", () => {

      selectedFiles = [
        ...selectedFiles,
        ...Array.from(fileInput.files)
      ];

      renderFiles();

      // 同じファイルを再選択可能にする
      fileInput.value = "";
    });


    // ファイル表示
    function renderFiles() {

      fileList.innerHTML = "";

      if (selectedFiles.length === 0) {
        filePreview.classList.add("hidden");
        return;
      }

      filePreview.classList.remove("hidden");

      selectedFiles.forEach((file, index) => {

        const fileItem = document.createElement("div");

        fileItem.className =
          "flex max-w-xs items-center gap-3 rounded-xl border bg-gray-50 px-3 py-2";

        fileItem.innerHTML = `
          <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-white border">
            📄
          </div>

          <div class="min-w-0 flex-1">
            <p class="truncate text-sm font-medium">
              ${escapeHTML(file.name)}
            </p>

            <p class="text-xs text-gray-500">
              ${formatBytes(file.size)}
            </p>
          </div>

          <button
            type="button"
            class="remove-file text-gray-400 hover:text-red-500"
            data-index="${index}"
          >
            ×
          </button>
        `;

        fileList.appendChild(fileItem);
      });


      document.querySelectorAll(".remove-file").forEach(button => {

        button.addEventListener("click", () => {

          const index = Number(button.dataset.index);

          selectedFiles.splice(index, 1);

          renderFiles();
        });

      });

    }


    // 送信
    chatForm.addEventListener("submit", async (event) => {

      event.preventDefault();

      const text = messageInput.value.trim();

      if (!text && selectedFiles.length === 0) return;


      const formData = new FormData();

      formData.append("message", text);

      selectedFiles.forEach(file => {
        formData.append("files", file);
      });


      // UIにユーザーメッセージを追加
      addUserMessage(text, selectedFiles);


      /*
        ここでAPIに送信する

        例:

        const response = await fetch("/api/chat", {
          method: "POST",
          body: formData
        });

        const data = await response.json();
      */


      messageInput.value = "";
      selectedFiles = [];
      renderFiles();


      // 仮のAI応答
      setTimeout(() => {

        addAIMessage(
          "ファイルを受信しました。バックエンドAPIに接続すれば、ここでAIによる解析結果を表示できます。"
        );

      }, 500);

    });


    // ユーザーメッセージ追加
    function addUserMessage(text, files) {

      const fileHTML = files.map(file => `
        <div class="mt-2 flex items-center gap-2 rounded-lg border bg-white px-3 py-2 text-sm">
          📄 ${escapeHTML(file.name)}
        </div>
      `).join("");


      const message = document.createElement("div");

      message.className =
        "mx-auto mb-8 flex max-w-3xl gap-4";

      message.innerHTML = `
        <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-black text-sm text-white">
          Q
        </div>

        <div class="min-w-0 flex-1">
          <p class="mb-2 font-semibold">あなた</p>

          <div class="rounded-2xl bg-gray-100 p-4">
            ${escapeHTML(text)}
            ${fileHTML}
          </div>
        </div>
      `;

      messages.appendChild(message);

      scrollToBottom();
    }


    // AIメッセージ追加
    function addAIMessage(text) {

      const message = document.createElement("div");

      message.className =
        "mx-auto mb-8 flex max-w-3xl gap-4";

      message.innerHTML = `
        <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-emerald-600 text-sm text-white">
          AI
        </div>

        <div class="min-w-0 flex-1">
          <p class="mb-2 font-semibold">ChatGPT</p>

          <div class="leading-7">
            ${escapeHTML(text)}
          </div>
        </div>
      `;

      messages.appendChild(message);

      scrollToBottom();
    }


    function scrollToBottom() {

      messages.scrollTo({
        top: messages.scrollHeight,
        behavior: "smooth"
      });

    }


    function formatBytes(bytes) {

      if (bytes === 0) return "0 Bytes";

      const units = ["Bytes", "KB", "MB", "GB"];

      const index =
        Math.floor(Math.log(bytes) / Math.log(1024));

      return `${(bytes / Math.pow(1024, index)).toFixed(1)} ${units[index]}`;
    }


    function escapeHTML(text) {

      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>

</body>
</html>
