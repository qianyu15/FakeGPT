<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>ChatGPT UI</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    *, :before, :after {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      max-width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Helvetica, Arial, sans-serif;
    }

    .app {
      width: 100%;
      max-width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    .message {
      min-width: 0;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .message pre {
      max-width: 100%;
      overflow-x: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    textarea {
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .scrollbar::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 999px;
    }

    .scrollbar {
      scrollbar-width: thin;
      scrollbar-color: #d1d5db transparent;
    }
  </style>

</head>

<body class="bg-white text-gray-900">

<div class="app flex">

  <!-- Sidebar -->

  <aside class="hidden w-64 shrink-0 flex-col border-r bg-gray-50 md:flex">
    <div class="shrink-0 p-4">
      <button
        id="newChatButton"
        type="button"
        class="flex w-full items-center gap-3 rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm font-medium shadow-sm transition hover:bg-gray-100"
      >
        <span class="text-lg">＋</span>
        新しいチャット
      </button>
    </div>


<div class="scrollbar min-h-0 flex-1 overflow-x-hidden overflow-y-auto px-3">
  <p class="px-3 py-2 text-xs font-semibold text-gray-400">今日</p>

  <button
    type="button"
    class="w-full truncate rounded-lg px-3 py-2 text-left text-sm transition hover:bg-gray-200"
  >
    ファイルについて質問
  </button>

  <button
    type="button"
    class="w-full truncate rounded-lg px-3 py-2 text-left text-sm transition hover:bg-gray-200"
  >
    Next.jsのコード解析
  </button>
</div>

<div class="shrink-0 border-t p-4">
  <div class="flex min-w-0 items-center gap-3">
    <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-black text-white">
      Q
    </div>

    <div class="min-w-0">
      <p class="truncate text-sm font-medium">Qianyu</p>
      <p class="text-xs text-gray-500">Free Plan</p>
    </div>
  </div>
</div>


  </aside>

  <!-- Main -->

  <main class="flex min-h-0 min-w-0 flex-1 flex-col">

<!-- Header -->
<header class="flex h-14 shrink-0 items-center justify-between border-b px-3 sm:px-4 md:px-6">
  <div class="flex min-w-0 items-center gap-2 sm:gap-3">

    <button
      id="mobileMenuButton"
      type="button"
      class="shrink-0 text-xl md:hidden"
      aria-label="メニュー"
    >
      ☰
    </button>

    <h1 class="truncate font-semibold">ChatGPT</h1>

    <span class="shrink-0 rounded-md bg-gray-100 px-2 py-1 text-xs text-gray-500">
      GPT-4o
    </span>
  </div>

  <button
    type="button"
    class="shrink-0 rounded-lg p-2 text-gray-500 transition hover:bg-gray-100"
    title="設定"
  >
    ⚙
  </button>
</header>

<!-- Messages -->
<section
  id="messages"
  class="scrollbar min-h-0 min-w-0 flex-1 overflow-x-hidden overflow-y-auto px-3 py-6 sm:px-4 sm:py-8 md:px-20 lg:px-32"
>

  <!-- User Message -->
  <div class="mx-auto mb-8 flex min-w-0 max-w-3xl gap-3 sm:gap-4">
    <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-black text-sm text-white">
      Q
    </div>

    <div class="min-w-0 max-w-full flex-1 overflow-hidden">
      <p class="mb-2 font-semibold">あなた</p>

      <div class="max-w-full overflow-hidden break-words rounded-2xl bg-gray-100 p-4">
        このファイルを解析してください。
      </div>
    </div>
  </div>

  <!-- AI Message -->
  <div class="mx-auto flex min-w-0 max-w-3xl gap-3 sm:gap-4">
    <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-emerald-600 text-sm text-white">
      AI
    </div>

    <div class="min-w-0 max-w-full flex-1 overflow-hidden">
      <p class="mb-2 font-semibold">ChatGPT</p>

      <div class="message leading-7">
        <div class="ai-text">
          ファイルを確認しました。内容を解析しています。
        </div>

        <!-- Copy Button -->
        <button
          type="button"
          class="copy-button mt-2 flex h-8 w-8 items-center justify-center rounded-lg text-gray-500 transition hover:bg-gray-100 hover:text-black"
          title="コピー"
          aria-label="回答をコピー"
          onclick="copyAIMessage(this)"
        >
          <!-- 複製アイコン -->
          <svg
            class="copy-icon h-4 w-4"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.8"
            stroke="currentColor"
          >
            <rect width="13" height="13" x="9" y="9" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</section>

<!-- Input -->
<div class="w-full max-w-full shrink-0 px-3 pb-3 sm:px-4 sm:pb-4 md:px-20 lg:px-32">

  <!-- File Preview -->
  <div
    id="filePreview"
    class="mx-auto mb-2 hidden w-full max-w-3xl"
  >
    <div
      id="fileList"
      class="flex max-w-full flex-wrap gap-2"
    ></div>
  </div>

  <!-- Form -->
  <form
    id="chatForm"
    class="mx-auto w-full max-w-3xl"
  >

    <div
      class="relative min-w-0 max-w-full rounded-2xl border border-gray-300 bg-white shadow-sm transition focus-within:border-gray-500"
    >

      <textarea
        id="messageInput"
        rows="1"
        placeholder="メッセージを入力..."
        class="block max-h-48 min-h-[56px] w-full max-w-full resize-none overflow-x-hidden overflow-y-auto bg-transparent px-4 pb-14 pt-4 pr-14 outline-none"
      ></textarea>

      <div class="absolute bottom-2 left-2 flex items-center gap-1">

        <label
          for="fileInput"
          class="flex h-9 w-9 shrink-0 cursor-pointer items-center justify-center rounded-lg text-gray-500 transition hover:bg-gray-100 hover:text-black"
          title="ファイルを添付"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.8"
            stroke="currentColor"
            class="h-5 w-5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m18.375 12.739-7.42 7.42a4.5 4.5 0 0 1-6.364-6.364l9.193-9.193a3 3 0 0 1 4.243 4.243l-9.193 9.193a1.5 1.5 0 0 1-2.121-2.121l8.486-8.486"
            />
          </svg>
        </label>

        <input
          id="fileInput"
          type="file"
          multiple
          hidden
        >

        <button
          type="button"
          class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg text-gray-500 transition hover:bg-gray-100"
          title="追加"
        >
          ＋
        </button>
      </div>

      <button
        id="sendButton"
        type="submit"
        class="absolute bottom-2 right-2 flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-black text-white transition hover:bg-gray-800 disabled:cursor-not-allowed disabled:opacity-40"
        title="送信"
      >
        ↑
      </button>

    </div>
  </form>

  <p class="mt-2 px-2 text-center text-xs text-gray-400">
    ChatGPTは間違えることがあります。重要な情報は確認してください。
  </p>
</div>


  </main>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const filePreview = document.getElementById("filePreview");
const fileList = document.getElementById("fileList");
const chatForm = document.getElementById("chatForm");
const messageInput = document.getElementById("messageInput");
const messages = document.getElementById("messages");
const sendButton = document.getElementById("sendButton");
const newChatButton = document.getElementById("newChatButton");

let selectedFiles = [];


/* =========================
   ファイル処理
========================= */

fileInput.addEventListener("change", () => {
  selectedFiles = [
    ...selectedFiles,
    ...Array.from(fileInput.files)
  ];

  renderFiles();

  fileInput.value = "";

  updateSendButton();
});


function renderFiles() {
  fileList.innerHTML = "";

  if (selectedFiles.length === 0) {
    filePreview.classList.add("hidden");
    return;
  }

  filePreview.classList.remove("hidden");

  selectedFiles.forEach((file, index) => {

    const fileItem = document.createElement("div");

    fileItem.className =
      "flex min-w-0 max-w-full items-center gap-3 overflow-hidden rounded-xl border bg-gray-50 px-3 py-2";

    fileItem.innerHTML = `
      <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg border bg-white">
        📄
      </div>

      <div class="min-w-0 flex-1 overflow-hidden">
        <p
          class="truncate text-sm font-medium"
          title="${escapeHTML(file.name)}"
        >
          ${escapeHTML(file.name)}
        </p>

        <p class="text-xs text-gray-500">
          ${formatBytes(file.size)}
        </p>
      </div>

      <button
        type="button"
        class="remove-file shrink-0 text-xl leading-none text-gray-400 transition hover:text-red-500"
        data-index="${index}"
        aria-label="ファイルを削除"
      >
        ×
      </button>
    `;

    fileList.appendChild(fileItem);
  });

  document.querySelectorAll(".remove-file").forEach(button => {

    button.addEventListener("click", () => {

      const index = Number(button.dataset.index);

      selectedFiles.splice(index, 1);

      renderFiles();

      updateSendButton();
    });
  });
}


/* =========================
   メッセージ送信
========================= */

chatForm.addEventListener("submit", event => {

  event.preventDefault();

  const text = messageInput.value.trim();

  if (!text && selectedFiles.length === 0) {
    return;
  }

  addUserMessage(text, selectedFiles);

  messageInput.value = "";

  selectedFiles = [];

  renderFiles();

  updateSendButton();

  setTimeout(() => {

    addAIMessage(
      "ファイルを受信しました。バックエンドAPIに接続すれば、ここでAIによる解析結果を表示できます。"
    );

  }, 500);
});


/* =========================
   ユーザーメッセージ
========================= */

function addUserMessage(text, files) {

  const fileHTML = files
    .map(file => `
      <div class="mt-2 flex min-w-0 max-w-full items-center gap-2 overflow-hidden rounded-lg border bg-white px-3 py-2 text-sm">
        <span class="shrink-0">📄</span>

        <span
          class="min-w-0 truncate"
          title="${escapeHTML(file.name)}"
        >
          ${escapeHTML(file.name)}
        </span>
      </div>
    `)
    .join("");

  const message = document.createElement("div");

  message.className =
    "mx-auto mb-8 flex min-w-0 max-w-3xl gap-3 sm:gap-4";

  message.innerHTML = `
    <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-black text-sm text-white">
      Q
    </div>

    <div class="min-w-0 max-w-full flex-1 overflow-hidden">

      <p class="mb-2 font-semibold">
        あなた
      </p>

      <div class="max-w-full overflow-hidden break-words rounded-2xl bg-gray-100 p-4">
        ${text ? escapeHTML(text) : ""}
        ${fileHTML}
      </div>

    </div>
  `;

  messages.appendChild(message);

  scrollToBottom();
}


/* =========================
   AIメッセージ
========================= */

function addAIMessage(text) {

  const message = document.createElement("div");

  message.className =
    "mx-auto mb-8 flex min-w-0 max-w-3xl gap-3 sm:gap-4";

  message.innerHTML = `
    <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-emerald-600 text-sm text-white">
      AI
    </div>

    <div class="min-w-0 max-w-full flex-1 overflow-hidden">

      <p class="mb-2 font-semibold">
        ChatGPT
      </p>

      <div class="message leading-7">

        <div class="ai-text">
          ${escapeHTML(text)}
        </div>

        <!-- コピー / チェックボタン -->
        <button
          type="button"
          class="copy-button mt-2 flex h-8 w-8 items-center justify-center rounded-lg text-gray-500 transition hover:bg-gray-100 hover:text-black"
          title="コピー"
          aria-label="回答をコピー"
          onclick="copyAIMessage(this)"
        >

          <!-- 複製アイコン -->
          <svg
            class="copy-icon h-4 w-4"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.8"
            stroke="currentColor"
          >
            <rect
              width="13"
              height="13"
              x="9"
              y="9"
              rx="2"
            />

            <path
              d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
            />
          </svg>

        </button>

      </div>

    </div>
  `;

  messages.appendChild(message);

  scrollToBottom();
}


/* =========================
   AI回答コピー
========================= */

function copyAIMessage(button) {

  const aiMessage = button
    .closest(".message")
    .querySelector(".ai-text");

  const text = aiMessage.innerText;

  navigator.clipboard.writeText(text).then(() => {

    // チェックアイコンへ変更
    button.innerHTML = `
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2"
        stroke="currentColor"
        class="h-4 w-4 text-emerald-600"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="m5 12 4 4L19 6"
        />
      </svg>
    `;

    button.title = "コピーしました";

    // 2秒後に複製アイコンへ戻す
    setTimeout(() => {

      button.innerHTML = `
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.8"
          stroke="currentColor"
          class="h-4 w-4"
        >
          <rect
            width="13"
            height="13"
            x="9"
            y="9"
            rx="2"
          />

          <path
            d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
          />
        </svg>
      `;

      button.title = "コピー";

    }, 2000);

  }).catch(error => {

    console.error("コピーに失敗しました:", error);

  });
}


/* =========================
   その他
========================= */

function scrollToBottom() {
  messages.scrollTo({
    top: messages.scrollHeight,
    behavior: "smooth"
  });
}


function formatBytes(bytes) {

  if (bytes === 0) {
    return "0 Bytes";
  }

  const units = [
    "Bytes",
    "KB",
    "MB",
    "GB"
  ];

  const index = Math.floor(
    Math.log(bytes) / Math.log(1024)
  );

  return `${(
    bytes / Math.pow(1024, index)
  ).toFixed(1)} ${units[index]}`;
}


function escapeHTML(text) {

  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}


newChatButton.addEventListener("click", () => {

  messages.innerHTML = "";

  selectedFiles = [];

  renderFiles();

  messageInput.value = "";

  updateSendButton();

  messageInput.focus();
});


messageInput.addEventListener("keydown", event => {

  if (
    event.key === "Enter" &&
    !event.shiftKey
  ) {

    event.preventDefault();

    chatForm.requestSubmit();
  }
});


function updateSendButton() {

  sendButton.disabled =
    !messageInput.value.trim() &&
    selectedFiles.length === 0;
}


messageInput.addEventListener(
  "input",
  updateSendButton
);


updateSendButton();

</script>

</body>
</html>
